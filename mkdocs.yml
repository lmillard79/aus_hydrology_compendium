site_name: Australian Hydrology Compendium
site_description: A searchable index of flood hydrology and water resources knowledge for Australian practitioners
site_url: https://lmillard79.github.io/aus_hydrology_compendium/
site_author: Lindsay Millard
repo_url: https://github.com/lmillard79/Aus_Hydrology_Compendium
repo_name: lmillard79/Aus_Hydrology_Compendium

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.code.copy
    - navigation.tracking

use_directory_urls: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lmillard79/Aus_Hydrology_Compendium

plugins:
  - search
  - tags

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
