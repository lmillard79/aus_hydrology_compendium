site_name: Australian Hydrology Compendium
site_description: A searchable index of flood hydrology and water resources knowledge for Australian practitioners
site_url: https://lamilla79.hf.space/aus_hydrology_compendium
repo_url: https://github.com/lmillard79/Aus_Hydrology_Compendium
repo_name: lmillard79/Aus_Hydrology_Compendium

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.code.copy

plugins:
  - search
  - tags

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Flood Frequency Analysis:
    - Overview: flood-frequency/index.md
    - Log Pearson III (LP3): flood-frequency/lp3.md
    - TCEV: flood-frequency/tcev.md
    - GEV: flood-frequency/gev.md
    - Non-stationarity: flood-frequency/non-stationarity.md
    - References: flood-frequency/references.md
  - Design Rainfall:
    - Overview: design-rainfall/index.md
  - Probable Maximum:
    - Overview: probable-maximum/index.md
  - Dam Safety:
    - Overview: dam-safety/index.md
  - ARR:
    - Overview: arr/index.md
  - Open Data:
    - Overview: open-data/index.md
  - FMA 2024 Themes:
    - Overview: fma-2024/index.md
    - Climate Change: fma-2024/climate-change.md
    - Technical Modelling: fma-2024/technical-modelling.md
    - Forecasting & Emergency: fma-2024/forecasting-emergency.md
    - Community Engagement: fma-2024/community-engagement.md
    - Urban Planning: fma-2024/urban-planning.md
  - Conference Papers:
    - Overview: conference-papers/index.md
    - FMA Conferences:
      - FMA 2025:
        - Overview: conference-papers/fma-2025-mindmap.md
        - Disaster Adaptation Plans: conference-papers/fma-2025/disaster-adaptation-plans.md
        - Modelling and Analysis: conference-papers/fma-2025/modelling-analysis.md
        - Infrastructure and Land Planning: conference-papers/fma-2025/infrastructure-land-planning.md
        - Governance and Programs: conference-papers/fma-2025/governance-programs.md
      - FMA 2024:
        - Overview: conference-papers/fma-2024-mindmap.md
        - Infragravity Waves: conference-papers/fma-2024/infragravity-waves.md
        - DT01 Flood Damage Tool: conference-papers/fma-2024/dt01-flood-damage-tool.md
        - Emergency Resources: conference-papers/fma-2024/emergency-resources.md
      - FMA 2023: conference-papers/fma-2023-mindmap.md
      - FMA 2022: conference-papers/fma-2022-mindmap.md
      - FMA 2020: conference-papers/fma-2020-mindmap.md
      - FMA 2019: conference-papers/fma-2019-mindmap.md
    - HWRS Conferences:
      - HWRS Mind Map Index: conference-papers/hwrs-index.md
      - HWRS 2025: conference-papers/hwrs-2025-mindmap.md
      - HWRS 2024: conference-papers/hwrs-2024-mindmap.md
      - HWRS 2023: conference-papers/hwrs-2023-mindmap.md
      - HWRS 2022: conference-papers/hwrs-2022-mindmap.md
      - HWRS 2021: conference-papers/hwrs-2021-mindmap.md
      - HWRS 2018: conference-papers/hwrs-2018-mindmap.md
      - HWRS 2016: conference-papers/hwrs-2016-mindmap.md
      - HWRS 2015: conference-papers/hwrs-2015-mindmap.md
      - HWRS 2014: conference-papers/hwrs-2014-mindmap.md
      - HWRS 2012: conference-papers/hwrs-2012-mindmap.md
      - HWRS 2011: conference-papers/hwrs-2011-mindmap.md
      - HWRS 2005: conference-papers/hwrs-2005-mindmap.md
  - Glossary: glossary.md
